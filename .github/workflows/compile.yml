name: ESPHome compile

# Two triggers:
#  1. Manual run (workflow_dispatch) — pick board+branch from the GitHub UI.
#  2. API trigger (repository_dispatch with event_type=compile) — used by the
#     Cloudflare Worker proxy that the web app calls.
on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Board id (see web/boards.js)'
        required: true
        default: 'esp32-s3-devkitc-1'
      branch:
        description: 'ESPHome branch'
        required: true
        default: 'stable'
        type: choice
        options: [stable, dev]
      yaml_b64:
        description: 'YAML config (base64)'
        required: true
  repository_dispatch:
    types: [compile]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve inputs
        id: in
        env:
          PAYLOAD_BOARD:    ${{ github.event.client_payload.board }}
          PAYLOAD_BRANCH:   ${{ github.event.client_payload.branch }}
          PAYLOAD_YAML_B64: ${{ github.event.client_payload.yaml_b64 }}
          PAYLOAD_FILES_B64: ${{ github.event.client_payload.files_b64 }}
          INPUT_BOARD:    ${{ inputs.board }}
          INPUT_BRANCH:   ${{ inputs.branch }}
          INPUT_YAML_B64: ${{ inputs.yaml_b64 }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "board=$PAYLOAD_BOARD"     >> $GITHUB_OUTPUT
            echo "branch=$PAYLOAD_BRANCH"   >> $GITHUB_OUTPUT
            echo "yaml_b64=$PAYLOAD_YAML_B64"   >> $GITHUB_OUTPUT
            echo "files_b64=$PAYLOAD_FILES_B64" >> $GITHUB_OUTPUT
          else
            echo "board=$INPUT_BOARD"     >> $GITHUB_OUTPUT
            echo "branch=$INPUT_BRANCH"   >> $GITHUB_OUTPUT
            echo "yaml_b64=$INPUT_YAML_B64" >> $GITHUB_OUTPUT
            echo "files_b64=" >> $GITHUB_OUTPUT
          fi

      - name: Decode YAML
        run: |
          mkdir -p build
          echo "${{ steps.in.outputs.yaml_b64 }}" | base64 -d > build/device.yaml
          echo "─── device.yaml ───"
          head -n 40 build/device.yaml

      - name: Write extra files
        if: steps.in.outputs.files_b64 != ''
        env:
          FILES_B64: ${{ steps.in.outputs.files_b64 }}
        run: |
          python3 - <<'PY'
          import base64, json, os, sys, pathlib
          raw = os.environ.get("FILES_B64", "")
          if not raw:
              print("(no extra files)"); sys.exit(0)
          try:
              files = json.loads(base64.b64decode(raw).decode("utf-8"))
          except Exception as e:
              print(f"::error::failed to decode files_b64: {e}"); sys.exit(1)
          build = pathlib.Path("build").resolve()
          for f in files:
              name = f.get("name", "")
              # Reject path traversal and absolute paths server-side too.
              if not name or name.startswith("/") or ".." in name.split("/") or "\\" in name:
                  print(f"::warning::skipping suspicious file name: {name!r}"); continue
              dst = (build / name).resolve()
              if not str(dst).startswith(str(build) + os.sep) and dst != build:
                  print(f"::warning::skipping out-of-tree file: {name!r}"); continue
              dst.parent.mkdir(parents=True, exist_ok=True)
              dst.write_bytes(base64.b64decode(f["content_b64"]))
              print(f" + build/{name}  ({dst.stat().st_size} bytes)")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome (${{ steps.in.outputs.branch }})
        run: |
          if [ "${{ steps.in.outputs.branch }}" = "dev" ]; then
            pip install --upgrade "git+https://github.com/esphome/esphome.git@dev"
          else
            pip install --upgrade esphome
          fi
          esphome version

      - name: Generate dummy secrets from YAML
        run: |
          python3 - <<'PY'
          import re, pathlib
          src  = pathlib.Path("build/device.yaml").read_text(encoding="utf-8", errors="replace")
          # Match `!secret <name>` — name = word chars, dashes, dots
          names = sorted(set(re.findall(r'!secret\s+([A-Za-z0-9_.\-]+)', src)))
          # Always include wifi_ssid / wifi_password as a safety net
          for n in ("wifi_ssid", "wifi_password"):
              if n not in names:
                  names.append(n)
          out = pathlib.Path("build/secrets.yaml")
          with out.open("w", encoding="utf-8") as f:
              for n in names:
                  # Use a 32-char hex placeholder so values like API encryption
                  # keys (which expect base64 of 32 bytes) don't trip ESPHome
                  # validators. It's still a dummy — the firmware can't actually
                  # connect anywhere with these.
                  f.write(f'{n}: "0123456789abcdef0123456789abcdef"\n')
          print(f"Generated {len(names)} dummy secret(s):")
          for n in names: print(" -", n)
          PY

      - name: Compile
        working-directory: build
        run: |
          esphome compile device.yaml

      - name: Locate firmware
        id: fw
        run: |
          BIN=$(find build/.esphome -name 'firmware*.bin' -o -name 'firmware-factory.bin' | head -n1 || true)
          [ -z "$BIN" ] && BIN=$(find build -name '*.bin' | head -n1)
          echo "bin=$BIN" >> $GITHUB_OUTPUT
          ls -lh "$BIN" || true

      - name: Upload firmware artifact
        if: steps.fw.outputs.bin != ''
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.in.outputs.board }}-${{ steps.in.outputs.branch }}
          path: ${{ steps.fw.outputs.bin }}
          if-no-files-found: error
